<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal — VITTRA</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAFAF8;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .wordmark {
      font-size: 11px;
      letter-spacing: 3px;
      font-weight: 700;
      color: #1A1A1A;
      text-transform: uppercase;
      margin-bottom: 48px;
      display: block;
    }

    .rule {
      width: 40px;
      height: 2px;
      background: #1A1A1A;
      margin: 0 auto 32px;
    }

    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: block;
      padding: 16px 24px;
      border: 0.5px solid #E0DDD8;
      border-radius: 12px;
      text-decoration: none;
      color: #1A1A1A;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .link-card:hover {
      background: #F0EFE9;
    }

    .link-card span {
      display: block;
      font-size: 12px;
      color: #888;
      margin-top: 2px;
      font-weight: 400;
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #BBB;
    }
  </style>
</head>

<body>
  <div class="container">
    <b class="wordmark">VITTRA</b>
    <div class="rule"></div>
    <p>Legal documents for the VITTRA iOS app.</p>
    <div class="links">
      <a class="link-card" href="privacy.html">
        Privacy Policy
        <span>How we handle your data</span>
      </a>
      <a class="link-card" href="terms.html">
        Terms of Service
        <span>Rules for using VITTRA</span>
      </a>
      <a class="link-card" href="support.html">
        Support
        <span>Get help with VITTRA</span>
      </a>
    </div>
    <div class="footer">Made with care by Dmzlabz · Israel</div>
  </div>
</body>

</html>
