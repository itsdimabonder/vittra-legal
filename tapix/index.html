<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal — Tapix</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0E0E10;
      color: #E8E8EC;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .wordmark {
      font-size: 11px;
      letter-spacing: 3px;
      font-weight: 700;
      color: #E8E8EC;
      text-transform: uppercase;
      margin-bottom: 48px;
      display: block;
    }

    .rule {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #7B6EF6, #A78BFA);
      margin: 0 auto 32px;
      border-radius: 1px;
    }

    p {
      font-size: 14px;
      color: #777;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: block;
      padding: 16px 24px;
      border: 0.5px solid #2A2A30;
      border-radius: 12px;
      text-decoration: none;
      color: #E8E8EC;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .link-card:hover {
      background: #1A1A20;
      border-color: #3A3A44;
    }

    .link-card span {
      display: block;
      font-size: 12px;
      color: #666;
      margin-top: 2px;
      font-weight: 400;
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>

<body>
  <div class="container">
    <b class="wordmark">TAPIX</b>
    <div class="rule"></div>
    <p>Legal documents for the Tapix iOS app.</p>
    <div class="links">
      <a class="link-card" href="privacy.html">
        Privacy Policy
        <span>How we handle your data</span>
      </a>
      <a class="link-card" href="terms.html">
        Terms of Service
        <span>Rules for using Tapix</span>
      </a>
      <a class="link-card" href="support.html">
        Support
        <span>Get help with Tapix</span>
      </a>
    </div>
    <div class="footer">Made with care by Dmzlabz · Israel</div>
  </div>
</body>

</html>
